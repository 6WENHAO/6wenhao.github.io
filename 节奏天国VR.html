<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
  html,body{margin:0;padding:0;background:#1a0d0d;height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;}
  canvas{display:block;}
  #hint{position:fixed;left:12px;bottom:12px;color:#ffe9b0;font:14px "PingFang SC","Microsoft YaHei",sans-serif;
        background:rgba(0,0,0,.45);padding:10px 14px;border-radius:10px;line-height:1.7;pointer-events:none;z-index:5;}
  #hint b{color:#ffd94d;}

<body>
<div id="hint">
  <b>节奏天国 VR</b>（原创美术与乐曲 · 致敬玩法）<br>
  🥽 VR：点击右下角「ENTER VR」，扳机选择 / 体感动作游玩<br>
  🖥️ 无头显试玩：鼠标拖动视角，<b>空格 / 点击</b> = 行动<br>
  ⚠️ WebXR 需要 HTTPS 或 localhost（如 <b>python3 -m http.server</b>）
</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
"use strict";
/* ============================================================
   节奏天国 VR · WebXR 致敬版 (原创美术与乐曲, 致敬玩法)
   VR特性: 体感出拳/合掌拍手/挥棒 · 控制器震动 · 立体声像 · 激光菜单
   ============================================================ */
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';

const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,u)=>a+(b-a)*u;
const TAU=Math.PI*2;

/* ---------------- 音频引擎 (移植自2D版) ---------------- */
let AC=null, master=null, noiseBuf=null;
function ensureAudio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=0.8; master.connect(AC.destination);
    const b=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    noiseBuf=b;
  }
  if(AC.state==='suspended') AC.resume();
}
function nowT(){ return AC?AC.currentTime:performance.now()/1000; }
function outNode(pan){
  if(pan===undefined||pan===0||!AC.createStereoPanner) return master;
  const p=AC.createStereoPanner(); p.pan.value=clamp(pan,-1,1); p.connect(master);
  return p;
}
function osc(type,f,t,dur,v,slideTo,pan){
  const o=AC.createOscillator(), gn=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  gn.gain.setValueAtTime(v,t);
  gn.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(gn); gn.connect(outNode(pan));
  o.start(t); o.stop(t+dur+0.02);
}
function noise(t,dur,v,ftype,freq,q,pan){
  const src=AC.createBufferSource(); src.buffer=noiseBuf;
  src.loop=true; src.loopStart=Math.random()*0.5;
  const flt=AC.createBiquadFilter(); flt.type=ftype||'lowpass';
  flt.frequency.value=freq||4000; flt.Q.value=q||0.8;
  const gn=AC.createGain();
  gn.gain.setValueAtTime(v,t);
  gn.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(flt); flt.connect(gn); gn.connect(outNode(pan));
  src.start(t); src.stop(t+dur+0.02);
}
const sKick =t=>{osc('sine',110,t,0.13,0.65,42);};
const sSnare=t=>{noise(t,0.13,0.35,'bandpass',1800,0.7);osc('triangle',210,t,0.06,0.22);};
const sHat  =(t,o)=>{noise(t,o?0.14:0.035,0.16,'highpass',7200);};
const sTick =t=>{noise(t,0.028,0.4,'highpass',5500);osc('square',1200,t,0.03,0.12);};
const sBass =(t,f,d)=>{osc('triangle',f,t,d||0.24,0.42);osc('square',f,t,(d||0.24)*0.8,0.07);};
const sChord=(t,fs,d,v)=>{fs.forEach(f=>osc('square',f,t,d||0.13,v||0.06));};
const sThrowPot =t=>{osc('sine',760,t,0.11,0.32,340);};
const sThrowRock=t=>{osc('sine',380,t,0.13,0.34,170);};
const sThrowBulb=t=>{osc('sine',900,t,0.08,0.28,500);osc('sine',1500,t+0.05,0.06,0.16);};
const sPunch=t=>{noise(t,0.06,0.55,'lowpass',900);osc('sine',160,t,0.09,0.5,55);};
const sBreak=t=>{noise(t,0.2,0.4,'bandpass',2600,1.2);noise(t+0.04,0.12,0.28,'bandpass',4200,1.5);};
const sRockHit=t=>{noise(t,0.1,0.5,'lowpass',500);osc('sine',90,t,0.15,0.6,40);};
const sDing=t=>{osc('triangle',1568,t,0.4,0.24);osc('triangle',2093,t+0.02,0.35,0.14);};
const sBonk=t=>{osc('square',280,t,0.2,0.26,75);};
const sWhiff=t=>{noise(t,0.1,0.2,'bandpass',700,1);};
const sClap=(t,pan)=>{noise(t,0.075,0.85,'bandpass',1150,1.2,pan);noise(t+0.009,0.06,0.5,'bandpass',1650,1.2,pan);};
const sPitch=t=>{osc('square',920,t,0.07,0.22);};
const sLob  =t=>{osc('sine',500,t,0.16,0.26,900);};
const sBat  =t=>{osc('square',1300,t,0.28,0.2,2100);noise(t,0.03,0.42,'highpass',3000);};
const sBlip =(t,f,v)=>{osc('square',f||880,t,0.07,v||0.2);};

class Cond{
  constructor(bpm,start){ this.bpm=bpm; this.start=start; this.spb=60/bpm; }
  time(b){ return this.start+b*this.spb; }
  beat(t){ return (t-this.start)/this.spb; }
}
function judgeDiff(d){
  const a=Math.abs(d);
  if(a<=0.075) return 'perfect';
  if(a<=0.16) return 'ok';
  return null;
}
/* 存档 */
function loadMedals(){ try{return JSON.parse(localStorage.getItem('rtvr_medals')||'{}');}catch(e){return{};} }
function saveMedal(k){ const m=loadMedals(); m[k]=true; localStorage.setItem('rtvr_medals',JSON.stringify(m)); }
function loadBest(){ try{return JSON.parse(localStorage.getItem('rtvr_best')||'{}');}catch(e){return{};} }
function saveBest(k,r){
  const rank={again:0,ok:1,superb:2}, b=loadBest();
  if((rank[b[k]]||-1)<rank[r]){ b[k]=r; localStorage.setItem('rtvr_best',JSON.stringify(b)); }
}

/* ---------------- 三维基础 ---------------- */
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.05,200);
const player=new THREE.Group();       // 玩家 rig
player.add(camera);
camera.position.set(0,1.6,0);
scene.add(player);

const hemi=new THREE.HemisphereLight(0xffffff,0x664422,1.0);
const dir=new THREE.DirectionalLight(0xffffff,1.4);
dir.position.set(3,6,2);
scene.add(hemi,dir);
const flashLight=new THREE.PointLight(0xffffee,0,12);
flashLight.position.set(0,2,-1); scene.add(flashLight);

/* ---------------- 控制器与体感 ---------------- */
const hands=[];
for(let i=0;i<2;i++){
  const c=renderer.xr.getController(i);
  c.userData={hand:i,handed:null};
  c.addEventListener('connected',e=>{ c.userData.handed=e.data&&e.data.handedness; refreshHandStyles(); });
  c.addEventListener('selectstart',()=>{ ensureAudio(); onTrigger(c); });
  c.addEventListener('squeezestart',()=>{ ensureAudio(); onTrigger(c); });
  player.add(c);
  hands.push({obj:c, pos:new THREE.Vector3(), vel:new THREE.Vector3(), speed:0,
              body:new THREE.Group(), laser:null});
  c.add(hands[i].body);
  const lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-6)]);
  const laser=new THREE.Line(lg,new THREE.LineBasicMaterial({color:0xffe9b0,transparent:true,opacity:0.6}));
  laser.visible=false; c.add(laser); hands[i].laser=laser;
}
function rightHand(){
  for(const h of hands) if(h.obj.userData.handed==='right') return h;
  return hands[1]||hands[0];
}
function haptic(h,inten,ms){
  try{
    const src=renderer.xr.getSession()&&h.obj.userData;
    const session=renderer.xr.getSession();
    if(!session) return;
    for(const s of session.inputSources){
      if(s.handedness===h.obj.userData.handed&&s.gamepad&&s.gamepad.hapticActuators&&s.gamepad.hapticActuators[0])
        s.gamepad.hapticActuators[0].pulse(inten,ms);
    }
  }catch(e){}
}
function hapticAll(inten,ms){ hands.forEach(h=>haptic(h,inten,ms)); }

/* 手部造型: pointer / glove / paw / bat */
let handStyle='pointer';
function clearGroup(g){
  while(g.children.length){ const c=g.children.pop(); disposeDeep(c); }
}
function refreshHandStyles(){ setHandStyle(handStyle); }
function setHandStyle(style){
  handStyle=style;
  for(const h of hands){
    clearGroup(h.body);
    if(style==='pointer'){
      h.body.add(new THREE.Mesh(new THREE.SphereGeometry(0.03,12,10),
        new THREE.MeshStandardMaterial({color:0xfff6e0})));
    } else if(style==='glove'){
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.065,16,14),
        new THREE.MeshStandardMaterial({color:0xe23b2e,roughness:0.5}));
      m.scale.set(1,0.9,1.15);
      const cuff=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.055,0.07,12),
        new THREE.MeshStandardMaterial({color:0xf8f5ec}));
      cuff.rotation.x=Math.PI/2; cuff.position.z=0.09;
      h.body.add(m,cuff);
    } else if(style==='paw'){
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.07,16,14),
        new THREE.MeshStandardMaterial({color:0xffcf3d,roughness:0.7}));
      m.scale.set(1,0.85,1.1);
      h.body.add(m);
      for(let i=-1;i<=1;i++){
        const toe=new THREE.Mesh(new THREE.SphereGeometry(0.022,10,8),
          new THREE.MeshStandardMaterial({color:0xf0b830}));
        toe.position.set(i*0.045,0.03,-0.06);
        h.body.add(toe);
      }
    } else if(style==='bat'){
      const isR=(h===rightHand());
      const grip=new THREE.Mesh(new THREE.SphereGeometry(0.04,12,10),
        new THREE.MeshStandardMaterial({color:0xf0c090}));
      h.body.add(grip);
      if(isR){
        const batG=new THREE.Group();
        const bat=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.018,0.78,14),
          new THREE.MeshStandardMaterial({color:0xc98a3a,roughness:0.6}));
        bat.position.y=0.42;
        const knob=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,0.02,12),
          new THREE.MeshStandardMaterial({color:0xa56a24}));
        knob.position.y=0.02;
        batG.add(bat,knob);
        batG.rotation.x=-Math.PI/3;
        h.body.add(batG);
      }
    }
  }
}
setHandStyle('pointer');

/* 桌面模式的手位置动画 */
let desktopActT=-9, desktopMode=true;
function updateDesktopHands(now){
  if(renderer.xr.isPresenting){ desktopMode=false; return; }
  desktopMode=true;
  const u=clamp((nowT()-desktopActT)/0.18,0,1);
  const ext=Math.sin(Math.min(u,1)*Math.PI);
  for(let i=0;i<2;i++){
    const s=i===0?-1:1;
    const c=hands[i].obj;
    if(handStyle==='glove'){
      c.position.set(s*0.22,1.15,-0.35-ext*0.4);
    } else if(handStyle==='paw'){
      c.position.set(s*lerp(0.26,0.04,ext),1.2,-0.4);
    } else if(handStyle==='bat'){
      c.position.set(s*0.22,1.15,-0.35);
      if(hands[i]===rightHand()) c.rotation.y=lerp(0.5,-1.6,ext);
    } else {
      c.position.set(s*0.22,1.2,-0.4);
      c.rotation.set(-0.5,0,0);
    }
  }
}

/* ---------------- 文字与面板工具 ---------------- */
function textCanvas(text,px,fill,stroke,lw){
  const c=document.createElement('canvas');
  const g2=c.getContext('2d');
  const font='bold '+px+'px "Arial Rounded MT Bold","PingFang SC","Microsoft YaHei",sans-serif';
  g2.font=font;
  const w=Math.ceil(g2.measureText(text).width)+px*0.6, h=Math.ceil(px*1.5);
  c.width=w; c.height=h;
  g2.font=font; g2.textAlign='center'; g2.textBaseline='middle';
  if(stroke){ g2.lineWidth=lw||px/6; g2.lineJoin='round'; g2.strokeStyle=stroke; g2.strokeText(text,w/2,h/2); }
  g2.fillStyle=fill; g2.fillText(text,w/2,h/2);
  return c;
}
function makeTextSprite(text,opt={}){
  const c=textCanvas(text,opt.px||96,opt.fill||'#fff',opt.stroke,opt.lw);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  const sp=new THREE.Sprite(mat);
  const hgt=opt.h||0.3;
  sp.scale.set(hgt*c.width/c.height,hgt,1);
  return sp;
}
function makePanel(pw,ph,worldW,drawFn){
  const c=document.createElement('canvas'); c.width=pw; c.height=ph;
  const g2=c.getContext('2d');
  drawFn(g2,pw,ph);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace;
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(worldW,worldW*ph/pw),
    new THREE.MeshBasicMaterial({map:tex,transparent:true}));
  mesh.userData.canvas=c; mesh.userData.tex=tex;
  return mesh;
}
function rr2(g2,x,y,w,h,r){
  g2.beginPath();
  g2.moveTo(x+r,y); g2.arcTo(x+w,y,x+w,y+h,r); g2.arcTo(x+w,y+h,x,y+h,r);
  g2.arcTo(x,y+h,x,y,r); g2.arcTo(x,y,x+w,y,r); g2.closePath();
}
function disposeDeep(o){
  o.traverse(n=>{
    if(n.geometry) n.geometry.dispose();
    if(n.material){
      const ms=Array.isArray(n.material)?n.material:[n.material];
      ms.forEach(m=>{ if(m.map) m.map.dispose(); m.dispose(); });
    }
  });
}

/* ---------------- 粒子 & 判定文字 ---------------- */
const fxParts=[], fxTexts=[];
const partGeo=new THREE.BoxGeometry(0.04,0.04,0.028);
function burst(pos,color,n=8,pow=3){
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(partGeo,new THREE.MeshBasicMaterial({color,transparent:true}));
    m.position.copy(pos);
    const a=Math.random()*TAU, b2=Math.random()*Math.PI;
    const sp=pow*(0.4+Math.random()*0.9);
    m.userData={vel:new THREE.Vector3(Math.cos(a)*Math.sin(b2)*sp,Math.abs(Math.cos(b2))*sp*0.9+1,Math.sin(a)*Math.sin(b2)*sp),
      rv:new THREE.Vector3(Math.random()*8,Math.random()*8,Math.random()*8),life:0,max:0.55+Math.random()*0.3};
    scene.add(m); fxParts.push(m);
  }
}
function judgeText(type,pos){
  const conf={perfect:['完美!','#ffd94d','#7a4a00'],ok:['还行','#9ed6ff','#1a4a7a'],miss:['MISS…','#cccccc','#555555']}[type];
  const sp=makeTextSprite(conf[0],{px:110,fill:conf[1],stroke:conf[2],lw:16,h:0.16});
  sp.position.copy(pos);
  sp.userData={life:0,max:0.8,vy:0.55};
  scene.add(sp); fxTexts.push(sp);
}
function updateFx(dt){
  for(let i=fxParts.length-1;i>=0;i--){
    const p=fxParts[i], u=p.userData;
    u.life+=dt;
    p.position.addScaledVector(u.vel,dt);
    u.vel.y-=7*dt;
    p.rotation.x+=u.rv.x*dt; p.rotation.y+=u.rv.y*dt;
    p.material.opacity=1-u.life/u.max;
    if(u.life>=u.max){ scene.remove(p); p.material.dispose(); fxParts.splice(i,1); }
  }
  for(let i=fxTexts.length-1;i>=0;i--){
    const t=fxTexts[i], u=t.userData;
    u.life+=dt;
    t.position.y+=u.vy*dt;
    const a=u.life/u.max;
    t.material.opacity=1-a*a;
    if(u.life>=u.max){ scene.remove(t); disposeDeep(t); fxTexts.splice(i,1); }
  }
}
function clearFx(){
  fxParts.forEach(p=>{scene.remove(p);p.material.dispose();});
  fxTexts.forEach(t=>{scene.remove(t);disposeDeep(t);});
  fxParts.length=0; fxTexts.length=0;
}

/* ---------------- 倒数显示 ---------------- */
function makeCountIn(root,pos){
  let cur=-1, sp=null;
  return {
    update(b){
      const n=(b>=0&&b<4)?4-Math.floor(b):-1;
      if(n!==cur){
        cur=n;
        if(sp){ root.remove(sp); disposeDeep(sp); sp=null; }
        if(n>0){
          sp=makeTextSprite(''+n,{px:160,fill:'#ffffff',stroke:'rgba(0,0,0,.45)',lw:20,h:0.5});
          sp.position.copy(pos);
          root.add(sp);
        }
      }
    }
  };
}

/* ---------------- 场景管理 ---------------- */
let cur=null;
function setScene(factory){
  if(cur){
    if(cur.root){ scene.remove(cur.root); disposeDeep(cur.root); }
    if(cur.leave) cur.leave();
  }
  clearFx();
  flashLight.intensity=0;
  cur=factory;
  scene.add(cur.root);
  if(cur.enter) cur.enter();
}
function setLasers(on){ hands.forEach(h=>h.laser.visible=on&&renderer.xr.isPresenting); }

/* 输入分发 */
const ray=new THREE.Raycaster();
function onTrigger(c){
  if(!cur) return;
  if(cur.interactives&&cur.interactives.length){
    const m=new THREE.Matrix4().identity().extractRotation(c.matrixWorld);
    ray.ray.origin.setFromMatrixPosition(c.matrixWorld);
    ray.ray.direction.set(0,0,-1).applyMatrix4(m);
    const hits=ray.intersectObjects(cur.interactives,false);
    if(hits.length&&cur.onSelect){ cur.onSelect(hits[0].object); return; }
  }
  doAction();
}
function doAction(){
  ensureAudio();
  desktopActT=nowT();
  if(cur&&cur.onAction) cur.onAction(nowT());
}
addEventListener('keydown',e=>{
  if(e.key===' '){ e.preventDefault(); if(e.repeat) return; ensureAudio();
    if(cur&&cur.interactives&&cur.interactives.length&&cur.onKeyConfirm){ cur.onKeyConfirm(); return; }
    doAction(); }
  if(e.key==='ArrowLeft'&&cur&&cur.nav) cur.nav(-1);
  if(e.key==='ArrowRight'&&cur&&cur.nav) cur.nav(1);
  if(e.key==='Enter'&&cur&&cur.onKeyConfirm){ ensureAudio(); cur.onKeyConfirm(); }
});
/* 桌面: 鼠标拖动视角 + 点击 */
let dragging=false,px0=0,py0=0,yaw=0,pitch=0,moved=0;
renderer.domElement.addEventListener('pointerdown',e=>{
  dragging=true; moved=0; px0=e.clientX; py0=e.clientY;
});
addEventListener('pointermove',e=>{
  if(!dragging||renderer.xr.isPresenting) return;
  const dx=e.clientX-px0, dy=e.clientY-py0;
  moved+=Math.abs(dx)+Math.abs(dy);
  yaw-=dx*0.004; pitch=clamp(pitch-dy*0.004,-1.2,1.2);
  camera.rotation.set(pitch,yaw,0,'YXZ');
  px0=e.clientX; py0=e.clientY;
});
addEventListener('pointerup',e=>{
  if(!dragging) return;
  dragging=false;
  if(moved<8){
    ensureAudio();
    if(cur&&cur.interactives&&cur.interactives.length){
      const nx=(e.clientX/innerWidth)*2-1, ny=-(e.clientY/innerHeight)*2+1;
      ray.setFromCamera({x:nx,y:ny},camera);
      const hits=ray.intersectObjects(cur.interactives,false);
      if(hits.length&&cur.onSelect){ cur.onSelect(hits[0].object); return; }
    }
    doAction();
  }
});
renderer.xr.addEventListener('sessionstart',()=>{ ensureAudio(); camera.rotation.set(0,0,0); });

/* ---------------- 体感检测 ---------------- */
const tmpV=new THREE.Vector3(), tmpV2=new THREE.Vector3(), fwd=new THREE.Vector3();
let prevHandDist=1, motionCool=0;
function updateMotion(dt){
  for(const h of hands){
    h.obj.getWorldPosition(tmpV);
    if(dt>0){
      tmpV2.copy(tmpV).sub(h.pos).divideScalar(dt);
      h.vel.lerp(tmpV2,0.55);
      h.speed=h.vel.length();
    }
    h.pos.copy(tmpV);
  }
  motionCool-=dt;
  if(!renderer.xr.isPresenting||!cur||!cur.motion||motionCool>0){ 
    prevHandDist=hands[0].pos.distanceTo(hands[1].pos); return;
  }
  camera.getWorldDirection(fwd);
  if(cur.motion==='punch'){
    for(const h of hands){
      if(h.vel.dot(fwd)>2.0){ motionCool=0.28; haptic(h,0.35,40); doAction(); break; }
    }
  } else if(cur.motion==='clap'){
    const d=hands[0].pos.distanceTo(hands[1].pos);
    const closing=(prevHandDist-d)/Math.max(dt,1e-4);
    if(d<0.19&&closing>1.1){ motionCool=0.35; hapticAll(0.5,50); doAction(); }
    prevHandDist=d; return;
  } else if(cur.motion==='swing'){
    const h=rightHand();
    if(h.speed>2.6){ motionCool=0.32; haptic(h,0.4,50); doAction(); }
  }
  prevHandDist=hands[0].pos.distanceTo(hands[1].pos);
}

/* ---------------- 环境搭建工具 ---------------- */
function skyDome(top,bottom){
  const geo=new THREE.SphereGeometry(80,24,16);
  const cols=[]; const p=geo.attributes.position;
  const cT=new THREE.Color(top), cB=new THREE.Color(bottom), c=new THREE.Color();
  for(let i=0;i<p.count;i++){
    const u=clamp((p.getY(i)/80+1)/2,0,1);
    c.copy(cB).lerp(cT,u);
    cols.push(c.r,c.g,c.b);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
  return new THREE.Mesh(geo,new THREE.MeshBasicMaterial({vertexColors:true,side:THREE.BackSide}));
}
function beatRing(color){
  const m=new THREE.Mesh(new THREE.RingGeometry(0.96,1.05,48),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.4,side:THREE.DoubleSide}));
  m.rotation.x=-Math.PI/2; m.position.y=0.015;
  return m;
}

/* ============================================================
   通用小游戏骨架
   ============================================================ */
function gameBase(bpm){
  return {
    cond:null, stepPtr:0,
    stats:{perfect:0,ok:0,miss:0,total:0},
    begin(){ ensureAudio(); this.cond=new Cond(bpm,AC.currentTime+0.5); this.stepPtr=0; },
    beat(now){ return this.cond.beat(now); },
    countIn(b,t){ if(b<4&&b%1===0){ sTick(t); sBlip(t,b===3?990:660,0.14); } },
    schedule(now,fn){
      while(this.cond.time(this.stepPtr*0.25)<now+0.12){
        const b=this.stepPtr*0.25, t=this.cond.time(b);
        this.countIn(b,t);
        if(b>=4) fn(b,t,(b-4));
        this.stepPtr++;
      }
    },
    record(j,pos){
      this.stats[j==='perfect'?'perfect':j==='ok'?'ok':'miss']++;
      judgeText(j,pos);
    }
  };
}

function resultScene(key,stats){

  saveBest(key,rating);
  if(rating==='superb') saveMedal(key);
  const comments=[];
  if(stats.miss===0&&stats.perfect>=stats.total*0.9) comments.push('几乎无懈可击!');
  else if(rating==='superb') comments.push('节奏感相当出色!');
  if(stats.ok>stats.perfect&&stats.miss<stats.total*0.2) comments.push('总感觉差了那么半拍。');
  if(stats.miss>=stats.total*0.3) comments.push('失误有点多了哦。');
  if(rating==='again'&&comments.length===0) comments.push('节奏……去哪里了?');

  const bg={superb:['#e0a020','#9a6a00'],ok:['#5a9a50','#2e5c2a'],again:['#5a5a7a','#33334a']}[rating];

    medal=makeTextSprite('🏅',{px:150,h:0.45});
    medal.position.set(0.95,1.7,-2.5); root.add(medal);
  }
  let t0=null;
  const bigTarget=big.scale.clone().multiplyScalar(1000);
  return {
    root,
    enter(){
      setHandStyle('pointer'); setLasers(false);
      ensureAudio(); t0=AC.currentTime;
      if(rating==='superb'){
        [523.25,659.25,783.99,1046.5].forEach((f,i)=>osc('triangle',f,t0+0.3+i*0.13,0.3,0.3));

  u.armL.rotation.x=u.armR.rotation.x=lerp(1.0,0.55,p);
}

/* ============================================================
   游戏 1: 空手家 (VR: 真实挥拳)
   ============================================================ */
const KCHART=[
  [4,'pot'],[6,'pot'],[8,'pot'],[10,'pot'],
  [12,'pot'],[13,'pot'],[14,'pot'],[16,'rock'],
  [18,'pot'],[20,'pot'],[21,'pot'],[22,'pot'],
  [24,'bulb'],[26,'pot'],[27,'pot'],[28,'rock'],
  [30,'pot'],[31.5,'pot'],[32,'pot'],[34,'bulb'],
  [36,'pot'],[37,'pot'],[38,'pot'],[39,'pot'],[40,'rock'],
  [42,'pot'],[43.5,'pot'],[44,'pot'],[46,'pot'],[47,'pot'],[48,'rock'],
  [52,'bulb'],[54,'pot'],[55,'pot'],[56,'pot'],[57,'pot'],[58,'rock']
];
const K_END=62;
const KBASS={0:55,0.75:55,1.5:82.41,2.5:55,3:73.42,3.5:82.41,
             4:55,4.75:55,5.5:82.41,6.5:98,7:87.31,7.5:82.41};
function karateScene(){
  const base=gameBase(120);
  const root=new THREE.Group();
  root.add(skyDome('#ffce55','#f59a1e'));
  hemi.color.set(0xfff2dd); hemi.groundColor.set(0xaa6622); hemi.intensity=1.1;
  dir.intensity=1.3;
  const ground=new THREE.Mesh(new THREE.CircleGeometry(40,48),
    new THREE.MeshStandardMaterial({color:0xc97a28,roughness:0.95}));
  ground.rotation.x=-Math.PI/2; root.add(ground);
  const ring=beatRing('#ffffff'); root.add(ring);
  /* 律动圆环 (地面波纹) */
  const waves=[];
  for(let i=0;i<4;i++){
    const w=new THREE.Mesh(new THREE.RingGeometry(0.98,1.02,48),
      new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.1,side:THREE.DoubleSide}));
    w.rotation.x=-Math.PI/2; w.position.y=0.02;
    root.add(w); waves.push(w);
  }
  const thrower=buildMachine(0x8a5a2a);
  thrower.position.set(0,0,-5); root.add(thrower);
  let throwAnimT=-9;

  const HITP=new THREE.Vector3(0,1.35,-0.5);       // 判定点
  const STARTP=new THREE.Vector3(0,1.7,-4.8);      // 出手点
  /* 提示圈: 显示打击位置 */
  const hitMark=new THREE.Mesh(new THREE.TorusGeometry(0.2,0.012,8,32),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.35}));
  hitMark.position.copy(HITP); root.add(hitMark);

  const evs=KCHART.map(e=>({beat:e[0],kind:e[1],judged:null,mesh:null,fly:null,missT:-1}));
  base.stats.total=evs.length;
  function buildObj(kind){ return kind==='pot'?buildPot():kind==='rock'?buildRock():buildBulb(); }
  function objColor(k){ return k==='pot'?'#c9773a':k==='rock'?'#9a9aa2':'#ffe98a'; }
  function objPos(ev,now,out){
    const t0=base.cond.time(ev.beat-2), t1=base.cond.time(ev.beat);
    const u=clamp((now-t0)/(t1-t0),0,1.35);
    out.lerpVectors(STARTP,HITP,u);
    out.y+=Math.sin(Math.min(u,1)*Math.PI)*1.5;
    return u;
  }
  const countIn=makeCountIn(root,new THREE.Vector3(0,2.4,-3));
  const tmp=new THREE.Vector3();
  let ended=false, endT=0;
  return {
    root, motion:'punch',
    enter(){ setHandStyle('glove'); setLasers(false); base.begin(); },
    onAction(now){
      let bestEv=null,bestD=1e9;
      for(const ev of evs){
        if(ev.judged) continue;
        const d=now-base.cond.time(ev.beat);
        if(d>-0.25&&d<0.25&&Math.abs(d)<Math.abs(bestD)){ bestD=d; bestEv=ev; }
      }
      if(bestEv){
        const j=judgeDiff(bestD);
        if(j){
          bestEv.judged=j;
          base.record(j,HITP.clone().add(new THREE.Vector3(0,0.25,0)));
          objPos(bestEv,now,tmp);
          sPunch(now);
          if(bestEv.kind==='rock'){ sRockHit(now); hapticAll(1.0,120); }
          else { sBreak(now+0.01); hapticAll(0.6,60); }
          if(bestEv.kind==='bulb'){ sDing(now+0.02); flashLight.intensity=14; flashLight.position.copy(tmp); }
          burst(tmp,objColor(bestEv.kind),10,j==='perfect'?4:2.5);
          if(j==='perfect'){
            burst(tmp,'#ffffff',6,3.5);
            bestEv.fly={pos:tmp.clone(),vel:new THREE.Vector3((Math.random()-0.5)*3,5.5+Math.random()*2,-11),
              rv:new THREE.Vector3(9,6,4),t:now};
          } else {
            if(bestEv.mesh){ root.remove(bestEv.mesh); disposeDeep(bestEv.mesh); bestEv.mesh=null; }
          }
          return;
        }
      }
      sWhiff(now);
    },
    update(now,dt){
      base.schedule(now,(b,t,mbAll)=>{
        const mb=mbAll%8;
        if(mb%4===0||mb%4===2) sKick(t);
        if(mb%2===1) sSnare(t);
        if(mb%0.5===0) sHat(t,mb%4===3.5);
        if(KBASS[mb]!==undefined) sBass(t,KBASS[mb]);
        if(mb===1.5||mb===5.5) sChord(t,[220,261.63,329.63,392]);
        if(mb===3.75||mb===7.75) sChord(t,[220,277.18,329.63,415.3],0.1,0.045);
        for(const ev of evs){
          if(Math.abs((ev.beat-2)-b)<1e-6){
            if(ev.kind==='pot') sThrowPot(t);
            else if(ev.kind==='rock') sThrowRock(t);
            else sThrowBulb(t);
            throwAnimT=t;
          }
        }
      });
      /* MISS 检查 */
      for(const ev of evs){
        if(!ev.judged&&now>base.cond.time(ev.beat)+0.16){
          ev.judged='miss'; ev.missT=now;
          base.record('miss',HITP.clone().add(new THREE.Vector3(0,0.25,0)));
          sBonk(now+0.08);
        }
      }
      /* 物体运动 */
      for(const ev of evs){
        const tThrow=base.cond.time(ev.beat-2);
        if(now<tThrow){ continue; }
        if(!ev.mesh&&!(ev.judged&&!ev.fly&&ev.judged!=='miss')){
          if(!(ev.judged==='ok')){
            ev.mesh=buildObj(ev.kind); root.add(ev.mesh);
          }
        }
        if(!ev.mesh) continue;
        if(ev.fly){
          ev.fly.pos.addScaledVector(ev.fly.vel,dt);
          ev.fly.vel.y-=8*dt;
          ev.mesh.position.copy(ev.fly.pos);
          ev.mesh.rotation.x+=ev.fly.rv.x*dt; ev.mesh.rotation.y+=ev.fly.rv.y*dt;
          if(ev.fly.pos.y<-2||ev.fly.pos.z<-40){ root.remove(ev.mesh); disposeDeep(ev.mesh); ev.mesh=null; ev.fly=null; }
          continue;
        }
        if(ev.judged==='miss'){
          const dtm=now-ev.missT;
          if(dtm<1.0){
            /* 从判定点擦过头侧掉落 */
            ev.mesh.position.set(
              lerp(HITP.x,0.45,Math.min(dtm*3,1)),
              HITP.y+dtm*0.5-dtm*dtm*4,
              lerp(HITP.z,0.6,Math.min(dtm*2.2,1)));
            ev.mesh.rotation.x+=dt*6;
          } else { root.remove(ev.mesh); disposeDeep(ev.mesh); ev.mesh=null; }
          continue;
        }
        if(!ev.judged){
          const u=objPos(ev,now,tmp);
          ev.mesh.position.copy(tmp);
          ev.mesh.rotation.z=Math.sin(u*Math.PI)*0.5;
          ev.mesh.rotation.y+=dt*3;
        }
      }
      /* 投掷臂动画 */
      const pa=clamp((now-throwAnimT)/0.25,0,1);
      thrower.userData.armPivot.rotation.x=-0.5-Math.sin(pa*Math.PI)*1.0;
      const b=Math.max(0,base.beat(now));
      const pulse=Math.max(0,1-(b%1));
      thrower.userData.lamp.material.emissiveIntensity=0.3+pulse*1.2;
      ring.scale.setScalar(1+pulse*0.2);
      ring.material.opacity=0.15+pulse*0.35;
      waves.forEach((w,i)=>{
        const rad=((b*0.5+i/4)%1)*14+1;
        w.scale.setScalar(rad);
        w.material.opacity=0.12*(1-rad/15);
      });
      hitMark.material.opacity=0.2+pulse*0.25;
      hitMark.rotation.y+=dt;
      flashLight.intensity=Math.max(0,flashLight.intensity-dt*80);
      countIn.update(b);
      if(!ended&&b>K_END){ ended=true; endT=now; }
      if(ended&&now-endT>0.5) setScene(resultScene('karate',base.stats));
    }
  };
}

/* ============================================================
   游戏 2: 拍手三人组 (VR: 双手合拍)
   ============================================================ */
const CSEQ=[[4,1],[8,1],[12,1],[16,1],[20,0.5],[24,1],[28,0.5],[32,1],
            [35,0.5],[38,0.5],[41,1],[44.5,0.5],[47,0.5]];
const C_END=51;
const CWALK=[110,130.81,164.81,196,220,196,164.81,130.81];
function clappyScene(){
  const base=gameBase(105);
  const root=new THREE.Group();
  root.add(skyDome('#2e8a6a','#1a5a44'));
  hemi.color.set(0xeeffee); hemi.groundColor.set(0x225544); hemi.intensity=0.9;
  dir.intensity=1.0;
  /* 舞台 */
  const stage=new THREE.Mesh(new THREE.CylinderGeometry(8,8,0.3,36),
    new THREE.MeshStandardMaterial({color:0x7a4a22,roughness:0.9}));
  stage.position.y=-0.15; root.add(stage);
  const trim=new THREE.Mesh(new THREE.TorusGeometry(8,0.08,8,48),
    new THREE.MeshStandardMaterial({color:0x96612e}));
  trim.rotation.x=Math.PI/2; trim.position.y=0.02; root.add(trim);
  /* 幕布背景 */
  const curtain=new THREE.Mesh(new THREE.CylinderGeometry(10,10,7,36,1,true,Math.PI*0.6,Math.PI*1.8),
    new THREE.MeshStandardMaterial({color:0x237a5a,roughness:1,side:THREE.BackSide}));
  curtain.position.y=3.2; root.add(curtain);
  const ring=beatRing('#aef0d0'); root.add(ring);

  /* 两只狮子在左侧, 玩家是最右 */
  const lions=[buildLion(),buildLion()];
  lions[0].position.set(-2.4,0,-0.4);
  lions[1].position.set(-1.2,0,-0.4);
  lions.forEach(l=>root.add(l));
  /* 聚光灯 */
  [-2.4,-1.2,0].forEach(x=>{
    const cone=new THREE.Mesh(new THREE.ConeGeometry(0.9,5,20,1,true),
      new THREE.MeshBasicMaterial({color:0xffffc8,transparent:true,opacity:0.07,side:THREE.DoubleSide,depthWrite:false}));
    cone.position.set(x,2.5,-0.4); root.add(cone);
  });
  const youMark=makeTextSprite('▼ 你',{px:70,fill:'#ffe9b0',stroke:'#3a2a10',lw:8,h:0.15});
  youMark.position.set(0,2.35,-0.5); root.add(youMark);

  const evs=CSEQ.map(s=>({beat:s[0]+2*s[1],cue1:s[0],cue2:s[0]+s[1],judged:null}));
  base.stats.total=evs.length;
  let annoyedT=-9, dotsSp=null;
  function lionClapP(i,now){
    let best=0;
    for(const ev of evs){
      const ct=base.cond.time(i===0?ev.cue1:ev.cue2);
      const d=now-ct;
      if(d>=0&&d<0.3) best=Math.max(best,1-d/0.3);
    }
    return best;
  }
  const countIn=makeCountIn(root,new THREE.Vector3(0,2.4,-2.5));
  const judgeP=new THREE.Vector3(0,1.7,-0.6);
  let ended=false, endT=0;
  return {
    root, motion:'clap',
    enter(){ setHandStyle('paw'); setLasers(false); base.begin(); },
    onAction(now){
      let bestEv=null,bestD=1e9;
      for(const ev of evs){
        if(ev.judged) continue;
        const d=now-base.cond.time(ev.beat);
        if(d>-0.3&&d<0.3&&Math.abs(d)<Math.abs(bestD)){ bestD=d; bestEv=ev; }
      }
      sClap(now,0.15);
      if(bestEv){
        const j=judgeDiff(bestD);
        if(j){
          bestEv.judged=j; base.record(j,judgeP);
          if(j==='perfect'){
            burst(new THREE.Vector3(0,1.4,-0.4),'#ffffff',7,2.5);
            hapticAll(0.7,70);
          } else hapticAll(0.4,40);
          return;
        } else if(bestD>-0.3&&bestD<0){
          bestEv.judged='miss'; base.record('miss',judgeP); annoyedT=now;
          return;
        }
      }
    },
    update(now,dt){
      base.schedule(now,(b,t,mbAll)=>{
        const mb=mbAll%8;
        if(mb%1===0) sBass(t,CWALK[mb],0.3);
        if(mb%1===0.5) sHat(t);
        if(mb===7.5) sBass(t,123.47,0.2);
        for(const ev of evs){
          if(Math.abs(ev.cue1-b)<1e-6) sClap(t,-0.7);
          if(Math.abs(ev.cue2-b)<1e-6) sClap(t,-0.4);
        }
      });
      for(const ev of evs){
        if(!ev.judged&&now>base.cond.time(ev.beat)+0.16){
          ev.judged='miss'; base.record('miss',judgeP);
          sBonk(now+0.05); annoyedT=now;
        }
      }
      const b=Math.max(0,base.beat(now));
      const pulse=Math.max(0,1-(b%1));
      lions.forEach((l,i)=>{
        const p=lionClapP(i,now);
        setLionClap(l,p);
        l.position.y=pulse*0.05;
        if(p>0.7&&Math.random()<dt*20)
          burst(l.position.clone().add(new THREE.Vector3(0,1.55,0.35)),'#ffffff',2,1.5);
      });
      /* 恼怒表情: 狮子转头看你 */
      const annoyed=(now-annoyedT)<1.1;
      lions.forEach(l=>{
        const target=annoyed?-0.5:0;
        l.userData.head.rotation.y=lerp(l.userData.head.rotation.y,target,dt*6);
      });
      if(annoyed&&!dotsSp){
        dotsSp=makeTextSprite('……',{px:90,fill:'#ffffff',stroke:'rgba(0,0,0,.4)',lw:10,h:0.2});
        dotsSp.position.set(-1.2,2.4,-0.4); root.add(dotsSp);
      } else if(!annoyed&&dotsSp){
        root.remove(dotsSp); disposeDeep(dotsSp); dotsSp=null;
      }
      ring.scale.setScalar(1+pulse*0.2);
      ring.material.opacity=0.15+pulse*0.35;
      countIn.update(b);
      if(!ended&&b>C_END){ ended=true; endT=now; }
      if(ended&&now-endT>0.5) setScene(resultScene('clappy',base.stats));
    }
  };
}

/* ============================================================

const SCHART=[[4,'n'],[6,'n'],[8,'n'],[10,'n'],[14,'l'],[16,'n'],[18,'n'],
              [22,'l'],[24,'n'],[26,'n'],[28,'n'],[30,'n'],[34,'l'],
              [36,'n'],[38,'n'],[40,'n'],[41,'n'],[42,'n'],[46,'l'],[48,'n']];
const S_END=52;
const SDIM=[[22,32],[40,44]];   // 原版镜头拉远段 → VR中灯光变暗
const SBASSCH=[65.41,65.41,55,55,87.31,87.31,98,98];
function spaceScene(){
  const base=gameBase(122);
  const root=new THREE.Group();
  root.add(skyDome('#0a0e2a','#1a1440'));
  hemi.color.set(0xccddff); hemi.groundColor.set(0x222244); hemi.intensity=0.8;

  for(let i=0;i<600;i++){
    const a=Math.random()*TAU, b2=Math.acos(Math.random()*2-1);
    const r=50+Math.random()*20;
    sp.push(r*Math.sin(b2)*Math.cos(a),Math.abs(r*Math.cos(b2))-5,r*Math.sin(b2)*Math.sin(a));
  }
  starGeo.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  const stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.25,sizeAttenuation:true}));
  root.add(stars);

  const planet=new THREE.Mesh(new THREE.SphereGeometry(6,20,16),

  /* 悬浮平台 + 玻璃罩 */
  const plat=new THREE.Mesh(new THREE.CylinderGeometry(5,5.6,0.4,28),
    new THREE.MeshStandardMaterial({color:0x3a3f5a,roughness:0.7}));
  plat.position.y=-0.2; root.add(plat);
  const platTop=new THREE.Mesh(new THREE.CylinderGeometry(5,5,0.06,28),
    new THREE.MeshStandardMaterial({color:0x565d80,roughness:0.6}));
  platTop.position.y=0.03; root.add(platTop);
  const dome=new THREE.Mesh(new THREE.SphereGeometry(5.5,24,14,0,TAU,0,Math.PI/2),
    new THREE.MeshPhysicalMaterial({color:0x8cc8ff,transparent:true,opacity:0.08,roughness:0.1,side:THREE.DoubleSide}));
  root.add(dome);
  const ring=beatRing('#8cc8ff'); root.add(ring);

  const machine=buildMachine(0x8a8fae);
  machine.position.set(0.4,0,-6.5); root.add(machine);
  let pitchAnimT=-9;

  const STRIKE=new THREE.Vector3(0.4,1.2,-0.55);
  const MUZZLE=new THREE.Vector3(0.4,1.6,-6.3);
  const strikeMark=new THREE.Mesh(new THREE.TorusGeometry(0.18,0.01,8,32),
    new THREE.MeshBasicMaterial({color:0x8cc8ff,transparent:true,opacity:0.3}));
  strikeMark.position.copy(STRIKE); root.add(strikeMark);

  const evs=SCHART.map(e=>({beat:e[0],kind:e[1],travel:e[1]==='l'?4:2,judged:null,mesh:null,fly:null,missT:-1}));
  base.stats.total=evs.length;
  function ballPos(ev,now,out){
    const t0=base.cond.time(ev.beat-ev.travel), t1=base.cond.time(ev.beat);
    const u=(now-t0)/(t1-t0);
    out.lerpVectors(MUZZLE,STRIKE,u);
    out.y+=Math.sin(clamp(u,0,1)*Math.PI)*(ev.kind==='l'?2.4:0.55);
    return u;
  }
  function dimAt(b){
    for(const [b0,b1] of SDIM){
      if(b>=b0&&b<b1){
        const edge=Math.min(b-b0,b1-b);
        return clamp(edge/1.5,0,1);
      }
    }
    return 0;
  }
  const countIn=makeCountIn(root,new THREE.Vector3(0,2.4,-3));
  const tmp=new THREE.Vector3();
  let ended=false, endT=0;
  return {
    root, motion:'swing',
    enter(){ setHandStyle('bat'); setLasers(false); base.begin(); },
    onAction(now){
      sWhiff(now);
      let bestEv=null,bestD=1e9;
      for(const ev of evs){
        if(ev.judged) continue;
        const d=now-base.cond.time(ev.beat);

      if(bestEv){
        const j=judgeDiff(bestD);
        if(j){
          bestEv.judged=j; base.record(j,STRIKE.clone().add(new THREE.Vector3(0,0.3,0)));
          ballPos(bestEv,now,tmp);
          sBat(now);
          haptic(rightHand(),1.0,90);
          const pow=j==='perfect'?1:0.6;
          bestEv.fly={pos:tmp.clone(),
            vel:new THREE.Vector3((Math.random()-0.3)*2,7*pow+3,-16*pow-6),t:now};
          burst(tmp,'#ffffff',j==='perfect'?10:5,j==='perfect'?4:2.5);
          if(j==='perfect') burst(tmp,'#ffe066',6,3);
        }
      }
    },
    update(now,dt){
      base.schedule(now,(b,t,mbAll)=>{
        const mb=mbAll%8;
        if(mb%4===0||mb%4===2) sKick(t);
        if(mb%2===1) sSnare(t);
        if(mb%0.5===0) sHat(t);
        if(mb%1===0||mb%1===0.5) sBass(t,SBASSCH[Math.floor(mb)],0.16);
        if(mb===0.5) sChord(t,[261.63,329.63,392]);
        if(mb===4.5) sChord(t,[349.23,440,523.25]);
        if(mb===6.5) sChord(t,[392,493.88,587.33]);
        if(mb===7.5) sBlip(t,1046.5,0.07);
        for(const ev of evs){
          if(Math.abs((ev.beat-ev.travel)-b)<1e-6){
            if(ev.kind==='l') sLob(t); else sPitch(t);
            pitchAnimT=t;
          }
        }
      });
      for(const ev of evs){
        if(!ev.judged&&now>base.cond.time(ev.beat)+0.16){
          ev.judged='miss'; ev.missT=now;
          base.record('miss',STRIKE.clone().add(new THREE.Vector3(0,0.3,0)));
          sWhiff(now);
        }
      }
      /* 球运动 */
      for(const ev of evs){
        const t0=base.cond.time(ev.beat-ev.travel);
        if(now<t0) continue;
        if(!ev.mesh&&!(ev.judged==='ok'&&!ev.fly)){
          ev.mesh=buildBaseball(); root.add(ev.mesh);
        }
        if(!ev.mesh) continue;
        if(ev.fly){
          ev.fly.pos.addScaledVector(ev.fly.vel,dt);
          ev.fly.vel.y-=2.5*dt;   // 太空低重力
          ev.mesh.position.copy(ev.fly.pos);
          ev.mesh.rotation.x+=dt*12;
          if(ev.fly.pos.z<-60||ev.fly.pos.y>40){ root.remove(ev.mesh); disposeDeep(ev.mesh); ev.mesh=null; ev.fly=null; }
          continue;
        }
        if(ev.judged==='miss'){
          const dtm=now-ev.missT;
          if(dtm<1.4){
            ev.mesh.position.set(STRIKE.x-dtm*0.5,STRIKE.y-dtm*dtm*3,STRIKE.z+dtm*2.2);
          } else { root.remove(ev.mesh); disposeDeep(ev.mesh); ev.mesh=null; }
          continue;
        }
        if(!ev.judged){
          const u=ballPos(ev,now,tmp);
          if(u<=1.35){ ev.mesh.position.copy(tmp); ev.mesh.rotation.z+=dt*10; }
        }
      }
      const b=Math.max(0,base.beat(now));
      const pulse=Math.max(0,1-(b%1));
      /* 灯光变暗段落 (原版的镜头拉远 → 用耳朵数节奏) */
      const dim=dimAt(b);
      hemi.intensity=lerp(0.8,0.12,dim);
      dir.intensity=lerp(0.9,0.1,dim);
      const pa=clamp((now-pitchAnimT)/0.25,0,1);
      machine.userData.armPivot.rotation.x=-0.5-Math.sin(pa*Math.PI)*0.9;
      machine.userData.lamp.material.emissiveIntensity=0.3+pulse*1.2;
      ring.scale.setScalar(1+pulse*0.2);
      ring.material.opacity=(0.12+pulse*0.3)*(1-dim*0.7);
      stars.rotation.y+=dt*0.005;
      countIn.update(b);
      if(!ended&&b>S_END){ ended=true; endT=now; }
      if(ended&&now-endT>0.5) setScene(resultScene('space',base.stats));
    }
  };
}

/* ---------------- 主循环 ---------------- */
let lastFrame=performance.now();
renderer.setAnimationLoop(()=>{
  const t=performance.now(), dt=Math.min(0.05,(t-lastFrame)/1000);
  lastFrame=t;
  updateDesktopHands();
  updateMotion(dt);
  const now=nowT();
  if(cur&&cur.update) cur.update(now,dt);
  updateFx(dt);
  renderer.render(scene,camera);
});

/* ---------------- 启动: 标题即菜单入口 ---------------- */
function titleScene(){
  const root=new THREE.Group();
  root.add(skyDome('#e23b2e','#7a1510'));
  const floor=new THREE.Mesh(new THREE.CircleGeometry(30,48),
    new THREE.MeshStandardMaterial({color:0x8a1c14,roughness:0.9}));
  floor.rotation.x=-Math.PI/2; root.add(floor);
  const title=makeTextSprite('节奏天国 VR',{px:150,fill:'#ffd94d',stroke:'#7a2010',lw:22,h:0.7});
  title.position.set(0,2.2,-3.5); root.add(title);
  const sub=makeTextSprite('跟上节奏就好，别的什么都不用想。',{px:56,fill:'rgba(255,240,220,.9)',h:0.13});
  sub.position.set(0,1.05,-3.2); root.add(sub);
  const go=makeTextSprite('▶ 扣扳机 / 空格 / 点击 开始',{px:76,fill:'#ffffff',stroke:'#7a2010',lw:10,h:0.2});
  go.position.set(0,1.55,-3.2); root.add(go);
  const notes=[];
  for(let i=0;i<14;i++){
    const n=makeTextSprite('♪',{px:90,fill:'rgba(255,255,255,.3)',h:0.3});
    n.position.set((Math.random()-0.5)*14,0.8+Math.random()*4,-3-Math.random()*9);
    n.userData={p:Math.random()*TAU};
    root.add(n); notes.push(n);
  }
  return {
    root,
    enter(){ setHandStyle('pointer'); setLasers(false); },
    onAction(){ setScene(menuScene()); },
    onKeyConfirm(){ setScene(menuScene()); },
    update(now,dt){
      const t=performance.now()/1000;
      title.position.y=2.2+Math.sin(t*4)*0.04;
      go.material.opacity=Math.floor(t*1.6)%2===0?1:0.3;
      notes.forEach(n=>{
        n.position.x+=dt*0.4;
        n.position.y+=Math.sin(t*2+n.userData.p)*0.003;
        if(n.position.x>7) n.position.x=-7;
      });
    }
  };
}
setScene(titleScene());
